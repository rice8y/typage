name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: typst-community/setup-typst@v4
        with:
          typst-version: 0.15.0

      - name: Test
        run: cargo test --locked

      - name: Package crate
        run: cargo package --locked

      - name: Create distribution folder
        run: |
          mkdir -p dist/typage
          tar -xzf target/package/typage-*.crate -C dist/typage --strip-components=1

      - name: Compress dist
        run: cd dist && zip -r ../typage-${{ github.ref_name }}.zip typage

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: typage-${{ github.ref_name }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
